# Server Configuration
server.port=8080

# Spring Profiles Activation
# Set to 'h2' for running in-memory without database installation, or 'postgres' for a persistent PostgreSQL setup
spring.profiles.active=h2

# Spring MVC and Jackson settings
spring.jackson.serialization.fail-on-empty-beans=false

# OpenAPI / Swagger configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha

# JWT Properties
# 256-bit secret key for HMAC-SHA256
auctioniq.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Token valid for 24 hours (86,400,000 milliseconds)
auctioniq.jwt.expiration-ms=86400000

# Gemini API Properties
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
gemini.api.key=${GEMINI_API_KEY:}
